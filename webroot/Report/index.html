<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Help Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-start:#1c2045;
  --bg-end:#0e1020;
  --card-bg:#1b1e33cc;
  --accent:#4da3ff;
  --accent-glow:rgba(77,163,255,0.3);
  --text-primary:#e9ecff;
  --text-secondary:#9aa3ff;
  --success:#4dff88;
  --warning:#ffaa4d;
  --border:#ffffff14;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html{
  font-size:clamp(14px,2.5vw,16px);
}

body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
  background:radial-gradient(ellipse at top,var(--bg-start) 0%,var(--bg-end) 100%);
  min-height:100vh;
  min-height:100dvh;
  padding:calc(var(--safe-top) + 1.5rem) 1rem calc(var(--safe-bottom) + 1.5rem);
  color:var(--text-primary);
  line-height:1.5;
}

.container{
  max-width:min(100%,28rem);
  margin:0 auto;
  animation:fadeIn 0.4s ease-out;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(1rem)}
  to{opacity:1;transform:translateY(0)}
}

.header{
  text-align:center;
  margin-bottom:1.5rem;
}

.header h1{
  font-size:clamp(1.5rem,5vw,1.75rem);
  font-weight:700;
  color:var(--text-primary);
  letter-spacing:-0.02em;
  margin-bottom:0.25rem;
}

.subtitle{
  color:var(--text-secondary);
  font-size:0.875rem;
  font-weight:400;
}

.card-list{
  display:flex;
  flex-direction:column;
  gap:0.75rem;
}

.action-card{
  display:flex;
  align-items:center;
  gap:1rem;
  padding:1rem 1.25rem;
  background:var(--card-bg);
  backdrop-filter:blur(14px);
  border:1px solid var(--border);
  border-radius:1rem;
  cursor:pointer;
  transition:all 0.2s ease;
  position:relative;
  overflow:hidden;
}

.action-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,var(--accent-glow) 0%,transparent 60%);
  opacity:0;
  transition:opacity 0.2s ease;
}

.action-card:active{
  transform:scale(0.98);
}

.action-card:active::before{
  opacity:1;
}

.icon-wrap{
  width:2.75rem;
  height:2.75rem;
  min-width:2.75rem;
  border-radius:0.75rem;
  background:rgba(77,163,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:1;
}

.icon-wrap svg{
  width:1.5rem;
  height:1.5rem;
  fill:var(--accent);
}

.card-info{
  flex:1;
  position:relative;
  z-index:1;
}

.card-title{
  font-size:1rem;
  font-weight:600;
  color:var(--text-primary);
  margin-bottom:0.125rem;
}

.card-desc{
  font-size:0.8125rem;
  color:var(--text-secondary);
}

.arrow{
  width:1.25rem;
  height:1.25rem;
  fill:var(--text-secondary);
  opacity:0.5;
  position:relative;
  z-index:1;
}

.divider{
  height:1px;
  background:var(--border);
  margin:1.5rem 0;
}

.footer{
  text-align:center;
  color:var(--text-secondary);
  font-size:0.75rem;
  opacity:0.6;
  margin-top:2rem;
}

.toast{
  position:fixed;
  top:1rem;
  left:50%;
  transform:translateX(-50%) translateY(-4rem);
  background:#1b1e33;
  color:var(--text-primary);
  padding:0.75rem 1.25rem;
  border-radius:0.75rem;
  border:1px solid var(--border);
  font-size:0.875rem;
  font-weight:500;
  opacity:0;
  transition:all 0.3s ease;
  z-index:10000;
  pointer-events:none;
  white-space:nowrap;
  backdrop-filter:blur(10px);
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid #ff4d4d}

.loader{
  position:fixed;
  inset:0;
  background:rgba(14,16,32,0.8);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:all 0.2s ease;
  z-index:9999;
}

.loader.show{
  opacity:1;
  visibility:visible;
}

.spinner{
  width:2.5rem;
  height:2.5rem;
  border:0.1875rem solid rgba(77,163,255,0.2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

@media(max-width:360px){
  html{font-size:13px}
  .action-card{padding:0.875rem 1rem}
  .icon-wrap{width:2.5rem;height:2.5rem;min-width:2.5rem}
}

@media(min-width:768px){
  html{font-size:16px}
  .container{max-width:24rem}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Help Center</h1>
    <div class="subtitle">Support & Resources</div>
  </div>
  
  <div class="card-list">
    <div class="action-card" data-action="link" data-url="https://t.me/TempMeow">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
      </div>
      <div class="card-info">
        <div class="card-title">Report Bug</div>

      <svg class="arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
    </div>
    
    <div class="action-card" data-action="link" data-url="https://t.me/MeowDump">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </div>

    </div>
    
    <div class="action-card" data-action="link" data-url="https://t.me/MeowRedirect">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>

    </div>
    
    <div class="action-card" data-action="link" data-url="https://github.com/MeowDump/Integrity-Box">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <div class="card-info">
        <div class="card-title">Source Code</div>

      <svg class="arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
    </div>
    
    <div class="divider"></div>
    
    <div class="action-card" data-action="script">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>

      <div class="card-info">
        <div class="card-title">Export Report</div>
        <div class="card-desc">Generate diagnostic logs</div>

      <svg class="arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
    </div>

  <div class="footer">IntegrityBox • 2026</div>
</div>

<div class="toast" id="toast"></div>
<div class="loader" id="loader"><div class="spinner"></div></div>

<script>
const CONFIG=[
  {action:"link",url:"https://t.me/TempMeow",title:"Report Bug",desc:"Submit issues to Telegram"},
  {action:"link",url:"https://t.me/MeowDump",title:"Support Group",desc:"Join Telegram community"},
  {action:"link",url:"https://t.me/MeowRedirect",title:"Updates Channel",desc:"Latest news & releases"},
  {action:"link",url:"https://github.com/MeowDump/Integrity-Box",title:"Source Code",desc:"View on GitHub"},
  {action:"script",title:"Export Report",desc:"Generate diagnostic logs"}
];

function showToast(msg,type="info"){
  const toast=document.getElementById("toast");
  toast.textContent=msg;
  toast.className="toast "+type;
  requestAnimationFrame(()=>toast.classList.add("show"));
  setTimeout(()=>toast.classList.remove("show"),2500);
}

function setLoader(show){
  document.getElementById("loader").classList.toggle("show",show);
}

function openLink(url){
  try{
    ksu.exec("am start -a android.intent.action.VIEW -d "+url);
    showToast("Opening...");
  }catch{
    showToast("Failed to open link","error");
  }
  setLoader(false);
}

function runScript(){
  try{
    ksu.exec("sh /data/adb/modules/playintegrityfix/webroot/common_scripts/Report.sh");
    showToast("Exported to /sdcard/report.json","success");
  }catch{
    showToast("Failed to export","error");
  }
  setLoader(false);
}

document.querySelectorAll(".action-card").forEach(card=>{
  card.addEventListener("click",()=>{
    setLoader(true);
    setTimeout(()=>{
      if(card.dataset.action==="link"){
        openLink(card.dataset.url);
      }else{
        runScript();
      }
    },100);
  });
});
</script>

</html>
