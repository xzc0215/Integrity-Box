<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Help Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-start:#1c2045;
  --bg-end:#0e1020;
  --card-bg:rgba(27,30,51,0.4);
  --card-border:rgba(255,255,255,0.06);
  --accent:#4da3ff;
  --accent-glow:rgba(77,163,255,0.8);
  --accent-bright:#6bb3ff;
  --text-primary:#ffffff;
  --text-secondary:#b8c0ff;
  --success:#4dff88;
  --success-glow:rgba(77,255,136,0.6);
  --glass-bg:rgba(255,255,255,0.02);
  --glass-border:rgba(255,255,255,0.04);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;
  background:radial-gradient(ellipse at top,var(--bg-start) 0%,var(--bg-end) 100%);
  min-height:100vh;
  padding:20px 16px 40px;
  color:var(--text-primary);
}

.container{
  max-width:430px;
  margin:0 auto;
  animation:fadeIn 0.5s cubic-bezier(0.4,0,0.2,1);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(30px) scale(0.96);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.header{
  text-align:center;
  margin-bottom:24px;
  padding-top:8px;
}

.header h1{
  font-size:26px;
  font-weight:800;
  color:var(--text-primary);
  letter-spacing:-0.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.header-icon{
  width:28px;
  height:28px;
  fill:var(--accent);
  filter:drop-shadow(0 0 10px var(--accent-glow));
}

.subtitle{
  color:var(--text-secondary);
  font-size:13px;
  margin-top:6px;
  font-weight:500;
}

.main-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.help-card{
  position:relative;
  aspect-ratio:1;
  border-radius:24px;
  overflow:hidden;
  cursor:pointer;
  background:linear-gradient(135deg,rgba(77,163,255,0.3) 0%,rgba(77,163,255,0.1) 100%);
  backdrop-filter:blur(10px);
  border:1px solid var(--accent);
  box-shadow:0 0 40px rgba(77,163,255,0.3),0 0 80px rgba(77,163,255,0.1);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}

.help-card:active{
  transform:scale(0.95);
}

.help-card:hover{
  background:linear-gradient(135deg,rgba(77,163,255,0.4) 0%,rgba(77,163,255,0.15) 100%);
  border-color:var(--accent-bright);
  box-shadow:0 0 50px rgba(77,163,255,0.4),0 0 100px rgba(77,163,255,0.15);
}

.help-card .card-bg-icon{
  fill:var(--accent-bright);
  opacity:0.5;
  filter:drop-shadow(0 0 30px var(--accent-glow));
}

.help-card:hover .card-bg-icon{
  transform:translate(-50%,-50%) scale(1.1);
}

.help-card .card-icon{
  fill:var(--accent-bright);
  filter:drop-shadow(0 0 15px var(--accent-glow));
}

.help-card .card-title{
  color:var(--accent-bright);
  text-shadow:0 0 20px rgba(77,163,255,0.5);
}

.card-bg-icon{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70%;
  height:70%;
  fill:var(--text-secondary);
  opacity:0.1;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  pointer-events:none;
}

.card-icon{
  position:absolute;
  top:16px;
  left:16px;
  width:28px;
  height:28px;
  fill:var(--accent);
  transition:all 0.3s ease;
  z-index:3;
}

.card-content{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:16px;
  background:linear-gradient(to top,rgba(14,16,32,0.98) 0%,rgba(14,16,32,0.8) 50%,transparent 100%);
  z-index:2;
}

.card-title{
  font-size:14px;
  font-weight:700;
  color:var(--text-primary);
  line-height:1.2;
  transition:all 0.3s ease;
}

.card-desc{
  font-size:11px;
  color:var(--text-secondary);
  line-height:1.3;
  opacity:0.9;
  margin-top:4px;
}

.summary-card{
  grid-column:span 2;
  background:linear-gradient(135deg,rgba(77,163,255,0.25) 0%,rgba(77,163,255,0.08) 100%);
  backdrop-filter:blur(20px);
  border:1px solid rgba(77,163,255,0.25);
  border-radius:24px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:16px;
  box-shadow:0 8px 32px rgba(77,163,255,0.15);
}

.summary-icon{
  width:48px;
  height:48px;
  fill:var(--accent);
  filter:drop-shadow(0 0 10px var(--accent-glow));
  flex-shrink:0;
}

.summary-info h3{
  font-size:16px;
  font-weight:700;
  color:var(--text-primary);
  margin-bottom:4px;
}

.summary-info p{
  font-size:13px;
  color:var(--text-secondary);
}

.footer{
  margin-top:24px;
  text-align:center;
  color:var(--text-secondary);
  font-size:12px;
  opacity:0.6;
  font-weight:500;
}

#loading-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(14,16,32,0.8);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10000;
  visibility:hidden;
  opacity:0;
  transition:opacity 0.3s ease,visibility 0.3s;
}

#loading-overlay.show{
  visibility:visible;
  opacity:1;
}

.spinner{
  width:48px;
  height:48px;
  border:3px solid rgba(77,163,255,0.2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  box-shadow:0 0 20px rgba(77,163,255,0.3);
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

@media(max-width:400px){
  .main-grid{
    grid-template-columns:1fr;
  }
  .help-card{
    aspect-ratio:1.5;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>
      <svg class="header-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
      Help Menu
    </h1>
    <div class="subtitle">Quick Actions & Useful Links</div>
  </div>

  <div class="main-grid" id="grid">
    <div class="summary-card">
      <svg class="summary-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      <div class="summary-info">
        <h3>IntegrityBox Support</h3>
        <p>Get help and report issues</p>
      </div>
    </div>
  </div>

  <div class="footer">© IntegrityBox • 2026</div>
</div>

<div id="loading-overlay"><div class="spinner"></div></div>

<script>
const CONFIG=[
  {id:"bug",icon:"M20 8h-2.81c-.45-1.12-1.15-2.1-2.02-2.86l1.41-1.41L14.41 2.1 12.7 3.81c-.9-.52-1.93-.81-3.03-.81-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6c0-1.1-.29-2.13-.81-3.03l1.71-1.71 1.42 1.42c-.76.87-1.74 1.57-2.86 2.02V20c0 1.1.9 2 2 2h3v-2h-3v-2.16c1.74-.41 3.31-1.35 4.5-2.65V8z",bg:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z",title:"Report A Bug",desc:"Report issues to Telegram group",action:"https://t.me/TempMeow"},
  {id:"code",icon:"M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z",bg:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z",title:"Source Code",desc:"View on GitHub repository",action:"https://github.com/MeowDump/Integrity-Box"},
  {id:"group",icon:"M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z",bg:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z",title:"Help Group",desc:"Join Telegram support group",action:"https://t.me/MeowDump"},
  {id:"channel",icon:"M18 11v2h-6.5l2 2-1 1-3.5-3.5 3.5-3.5 1 1-2 2H18zm-4-7c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z",bg:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z",title:"Updates Channel",desc:"Get latest news and updates",action:"https://t.me/MeowRedirect"},
  {id:"report",icon:"M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z",bg:"M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z",title:"Export Report",desc:"Generate diagnostic report",action:"script"}
];

function popup(msg,type="info"){
  try{
    if(typeof window.toast==="function"){window.toast(String(msg));return 2500;}
    if(window.kernelsu&&typeof window.kernelsu.toast==="function"){window.kernelsu.toast(String(msg));return 2500;}
    if(typeof ksu==="object"&&typeof ksu.toast==="function"){ksu.toast(String(msg));return 2500;}
  }catch{}
  const n=document.createElement("div");
  n.className="webui-popup";
  n.textContent=msg;
  const colors={error:"#f44336",success:"#4caf50",info:"#1565c0",warn:"#ff8f00"};
  const bg=colors[type]||"#0099FF";
  Object.assign(n.style,{
    position:"fixed",top:"-70px",left:"50%",transform:"translateX(-50%)",
    background:bg,color:"#fff",padding:"0.8rem 1.2rem",borderRadius:"8px",
    boxShadow:"0 6px 18px rgba(0,0,0,0.35)",fontWeight:"600",zIndex:"99999",
    transition:"top 0.36s,opacity 0.36s",opacity:"0"
  });
  document.body.appendChild(n);
  requestAnimationFrame(()=>{n.style.top="20px";n.style.opacity="1";});
  setTimeout(()=>{n.style.top="-70px";n.style.opacity="0";setTimeout(()=>n.remove(),420);},2500);
  return 2500;
}

function showLoader(show=true){
  const overlay=document.getElementById('loading-overlay');
  if(show)overlay.classList.add('show');
  else overlay.classList.remove('show');
}

function openLink(url){
  try{
    ksu.exec(`am start -a android.intent.action.VIEW -d ${url}`);
    const duration=popup("Redirecting...","info");
    setTimeout(()=>showLoader(false),duration);
  }catch(e){
    const duration=popup("Failed to open link","error");
    setTimeout(()=>showLoader(false),duration);
  }
}

function runScript(){
  showLoader(true);
  setTimeout(()=>{
    try{
      ksu.exec('sh /data/adb/modules/playintegrityfix/webroot/common_scripts/Report.sh');
      const duration=popup("Exported to /sdcard/report.json","success");
      setTimeout(()=>showLoader(false),duration);
    }catch(e){
      const duration=popup("Failed to execute script","error");
      setTimeout(()=>showLoader(false),duration);
    }
  },50);
}

function handleAction(action){
  showLoader(true);
  setTimeout(()=>{
    try{action();}catch(e){}
  },50);
}

function createCard(cfg){
  const div=document.createElement("div");
  div.className="help-card";
  div.onclick=function(){
    if(cfg.action==="script"){
      handleAction(runScript);
    }else{
      handleAction(()=>openLink(cfg.action));
    }
  };
  div.innerHTML='<svg class="card-bg-icon" viewBox="0 0 24 24"><path d="'+cfg.bg+'"/></svg><svg class="card-icon" viewBox="0 0 24 24"><path d="'+cfg.icon+'"/></svg><div class="card-content"><div class="card-title">'+cfg.title+'</div><div class="card-desc">'+cfg.desc+'</div></div>';
  return div;
}

function init(){
  const grid=document.getElementById("grid");
  for(let i=0;i<CONFIG.length;i++){
    grid.appendChild(createCard(CONFIG[i]));
  }
}

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
