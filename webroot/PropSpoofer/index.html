<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Prop Spoofer</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
:root{
--bg:#1f2233;
--fg:#e6e6e6;
--accent:#4da3ff;
--accent-glow:rgba(77,163,255,0.3);
--danger:#ff4d4d;
--danger-glow:rgba(255,77,77,0.3);
--panel-bg:#232637cc;
--success:#4dff88;
--pink:#ff6b9d;
--pink-glow:rgba(255,107,157,0.3);
--text2:#9aa3ff;
--transition:0.3s;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
margin:0;min-height:100vh;
display:flex;align-items:center;justify-content:center;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui;
background:radial-gradient(circle at 30% 20%,#1c2045 0%,#0e1020 100%);
color:var(--fg);
-webkit-font-smoothing:antialiased;
padding:20px;
}
.card{
width:420px;max-width:100%;
background:var(--panel-bg);
backdrop-filter:blur(20px);
border-radius:20px;
padding:28px;
box-shadow:0 25px 60px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.06);
position:relative;overflow:hidden;
animation:cardEntry 0.6s cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes cardEntry{
from{opacity:0;transform:translateY(30px) scale(0.96)}
to{opacity:1;transform:translateY(0) scale(1)}
}
.card::before{
content:"";
position:absolute;inset:0;
background:radial-gradient(circle at 50% 0%,var(--accent) 0%,transparent 70%);
filter:blur(40px);opacity:0.15;pointer-events:none;z-index:0;
animation:glowPulse 8s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:0.12}50%{opacity:0.25}}
h1{
position:relative;z-index:2;
margin:0 0 8px 0;text-align:center;
font-size:22px;font-weight:700;
display:flex;align-items:center;justify-content:center;gap:10px;
}
.subtitle{
text-align:center;color:var(--text2);
font-size:13px;font-weight:500;margin-bottom:24px;
position:relative;z-index:2;
}
.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:12px;
position:relative;z-index:2;
}
.btn{
padding:14px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.03);
color:var(--fg);
font-size:13px;
font-weight:600;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}
.btn:hover{
background:rgba(255,255,255,0.06);
transform:translateY(-2px);
border-color:rgba(77,163,255,0.2);
}
.btn:active{transform:scale(0.96)}
.btn .material-icons{font-size:18px;color:var(--text2)}
.btn-primary{
background:rgba(77,163,255,0.1);
border-color:rgba(77,163,255,0.3);
color:var(--accent);
}
.btn-primary .material-icons{color:var(--accent)}
.btn-primary:hover{
background:rgba(77,163,255,0.2);
box-shadow:0 8px 24px rgba(77,163,255,0.2);
}
.btn-danger{
background:rgba(255,77,77,0.1);
border-color:rgba(255,77,77,0.3);
color:var(--danger);
}
.btn-danger .material-icons{color:var(--danger)}
.btn-danger:hover{
background:rgba(255,77,77,0.2);
box-shadow:0 8px 24px rgba(255,77,77,0.2);
}
.apply-wrap{
display:flex;
justify-content:center;
margin-bottom:20px;
position:relative;z-index:2;
}
.apply-btn{
padding:16px 48px;
border-radius:14px;
border:1px solid rgba(77,163,255,0.4);
background:linear-gradient(135deg,rgba(77,163,255,0.15),rgba(77,163,255,0.05));
color:var(--accent);
font-size:15px;
font-weight:700;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
text-transform:uppercase;
letter-spacing:0.5px;
}
.apply-btn:hover{
background:linear-gradient(135deg,rgba(77,163,255,0.25),rgba(77,163,255,0.1));
transform:translateY(-2px) scale(1.02);
box-shadow:0 12px 32px rgba(77,163,255,0.3);
}
.apply-btn:active{transform:scale(0.98)}
.apply-btn .material-icons{font-size:22px;color:var(--accent)}
.terminal{
position:relative;z-index:2;
margin-bottom:20px;
border-radius:16px;
background:linear-gradient(135deg,rgba(21,146,255,0.08) 0%,rgba(21,146,255,0.03) 100%);
border:1px solid rgba(77,163,255,0.2);
box-shadow:0 0 40px rgba(77,163,255,0.1),inset 0 1px 0 rgba(255,255,255,0.05);
overflow:hidden;
}
.terminal-header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
background:rgba(77,163,255,0.08);
border-bottom:1px solid rgba(77,163,255,0.15);
}
.terminal-title{
display:flex;
align-items:center;
gap:8px;
font-size:12px;
font-weight:600;
color:var(--accent);
text-transform:uppercase;
letter-spacing:0.5px;
}
.terminal-title .material-icons{font-size:16px;color:var(--accent)}
.terminal-actions{
display:flex;
gap:8px;
}
.dot{
width:10px;height:10px;
border-radius:50%;
background:rgba(255,255,255,0.2);
}
.dot.red{background:var(--danger)}
.dot.yellow{background:#ff9f0a}
.dot.green{background:var(--success)}
.terminal-body{
padding:16px;
font-family:'SF Mono',SFMono-Regular,monospace;
font-size:11px;
line-height:1.6;
height:160px;
overflow-y:auto;
color:rgba(255,255,255,0.6);
}
.terminal-body::-webkit-scrollbar{width:6px}
.terminal-body::-webkit-scrollbar-track{background:transparent}
.terminal-body::-webkit-scrollbar-thumb{
background:rgba(77,163,255,0.3);
border-radius:3px;
}
.log-entry{
display:flex;
align-items:flex-start;
gap:10px;
margin-bottom:6px;
padding:6px 0;
border-bottom:1px solid rgba(77,163,255,0.1);
animation:slideIn 0.3s ease;
}
@keyframes slideIn{
from{opacity:0;transform:translateX(-10px)}
to{opacity:1;transform:translateX(0)}
}
.log-entry:last-child{border-bottom:none}
.log-time{
color:rgba(77,163,255,0.5);
font-size:10px;
min-width:50px;
}
.log-content{
flex:1;
display:flex;
align-items:center;
gap:8px;
}
.log-icon{
width:16px;
height:16px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}
.log-icon.ok{background:rgba(77,255,136,0.15);color:var(--success)}
.log-icon.err{background:rgba(255,77,77,0.15);color:var(--danger)}
.log-icon.cmd{background:rgba(77,163,255,0.2);color:var(--accent)}
.log-icon.info{background:rgba(255,255,255,0.1);color:var(--text2)}
.log-text{flex:1;word-break:break-all}
.section-title{
position:relative;z-index:2;
font-size:12px;
font-weight:600;
color:var(--text2);
text-transform:uppercase;
letter-spacing:0.5px;
margin:20px 0 12px 0;
padding-left:12px;
border-left:3px solid var(--accent);
}
.section-title.danger{
border-left-color:var(--danger);
color:var(--danger);
}
.section-title.success{
border-left-color:var(--pink);
color:var(--pink);
}
.row{
position:relative;z-index:2;
display:flex;align-items:center;justify-content:space-between;
gap:14px;padding:14px 16px;border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.06);
margin-bottom:8px;
transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
cursor:pointer;
}
.row:hover{
background:rgba(255,255,255,0.06);
transform:translateY(-2px);
box-shadow:0 8px 24px rgba(0,0,0,0.3);
border-color:rgba(77,163,255,0.2);
}
.row:active{transform:scale(0.98)}
.row.active{
background:rgba(77,163,255,0.1);
border-color:rgba(77,163,255,0.4);
box-shadow:0 0 20px rgba(77,163,255,0.15);
}
.row.active .icon-wrap{
background:var(--accent);
box-shadow:0 4px 16px var(--accent-glow);
}
.row.active .icon-wrap .material-icons{color:white}
.row.active .title{color:var(--accent)}
.row.danger:hover{
border-color:rgba(255,77,77,0.3);
}
.row.danger.active{
background:rgba(255,77,77,0.1);
border-color:rgba(255,77,77,0.5);
box-shadow:0 0 20px rgba(255,77,77,0.15);
}
.row.danger.active .icon-wrap{
background:var(--danger);
box-shadow:0 4px 16px var(--danger-glow);
}
.row.danger.active .title{color:var(--danger)}
.row.success.active{
background:rgba(255,107,157,0.1);
border-color:rgba(255,107,157,0.4);
box-shadow:0 0 20px rgba(255,107,157,0.15);
}
.row.success.active .icon-wrap{
background:var(--pink);
box-shadow:0 4px 16px var(--pink-glow);
}
.row.success.active .icon-wrap .material-icons{color:white}
.row.success.active .title{color:var(--pink)}
.row.success:hover{
border-color:rgba(255,107,157,0.3);
}
.icon-wrap{
width:40px;height:40px;border-radius:10px;
background:rgba(255,255,255,0.08);
display:flex;align-items:center;justify-content:center;
transition:all 0.3s;flex-shrink:0;
}
.icon-wrap .material-icons{
font-size:20px;color:var(--text2);
transition:all 0.3s;
}
.content{flex:1;min-width:0}
.title{
font-size:15px;font-weight:600;
color:var(--fg);margin-bottom:2px;
transition:color 0.3s;
}
.subtitle-text{
font-size:11px;color:var(--text2);
font-weight:500;
opacity:0.8;
font-family:'SF Mono',SFMono-Regular,monospace;
}
.switch{
position:relative;width:50px;height:28px;flex-shrink:0;
pointer-events:none;
}
.switch input{position:absolute;opacity:0;width:0;height:0}
.slider{
position:absolute;inset:0;border-radius:999px;
background:rgba(255,255,255,0.1);
transition:all var(--transition);
box-shadow:inset 0 2px 4px rgba(0,0,0,0.2);
}
.knob{
position:absolute;left:2px;top:2px;
width:24px;height:24px;border-radius:50%;
background:linear-gradient(145deg,#fff,#e0e0e0);
transition:transform 0.25s cubic-bezier(0.2,0.8,0.2,1);
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.switch input:checked + .slider{
background:var(--accent);
box-shadow:0 0 20px var(--accent-glow);
}
.switch input:checked + .slider .knob{transform:translateX(22px)}
.row.danger .switch input:checked + .slider{
background:var(--danger);
box-shadow:0 0 20px var(--danger-glow);
}
.row.success .switch input:checked + .slider{
background:var(--pink);
box-shadow:0 0 20px var(--pink-glow);
}
.status-bar{
display:flex;
align-items:center;
justify-content:space-between;
margin-top:16px;
padding:0 4px;
position:relative;z-index:2;
}
.status-text{
font-size:12px;
color:var(--text2);
font-weight:500;
display:flex;
align-items:center;
gap:8px;
}
.spinner{
width:14px;height:14px;
border:2px solid rgba(255,255,255,0.1);
border-top-color:var(--accent);
border-radius:50%;
animation:spin 0.8s linear infinite;
display:none;
}
.spinner.active{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{
margin-top:16px;text-align:center;
color:var(--text2);font-size:11px;opacity:0.6;
position:relative;z-index:2;
}
@media(max-width:420px){
.card{width:100%;padding:20px}
.row{padding:12px 14px}
.icon-wrap{width:36px;height:36px}
.terminal-body{height:140px}
}
</style>
</head>

function toggle(id){
const el=document.getElementById(id);
if(el){
el.checked=!el.checked;
document.getElementById('row-'+id).classList.toggle('active',el.checked);
}
}

function log(msg,type){
const entry=document.createElement('div');
entry.className='log-entry';
const time=document.createElement('span');
time.className='log-time';
const now=new Date();
time.textContent=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
const content=document.createElement('div');
content.className='log-content';
const icon=document.createElement('span');
icon.className='material-icons log-icon '+type;
if(type==='ok')icon.textContent='check';
else if(type==='err')icon.textContent='close';
else if(type==='cmd')icon.textContent='chevron_right';
else icon.textContent='info';
const text=document.createElement('span');
text.className='log-text';
text.textContent=msg;
content.appendChild(icon);
content.appendChild(text);
entry.appendChild(time);
entry.appendChild(content);
logEl.appendChild(entry);
logEl.scrollTop=logEl.scrollHeight;
}

function setStatus(text,loading){
statusEl.innerHTML=loading?`<div class="spinner active" style="display:inline-block;width:12px;height:12px;border-width:2px;margin-right:6px"></div>${text}`:text;

}

async function sh(cmd){
if(window.parent && window.parent !== window && typeof window.parent.runShellFromIframe === 'function'){
try{
const result=await window.parent.runShellFromIframe(cmd);
return result.replace(/\r/g,'');
}catch(e){
throw new Error(e.message||'Shell failed');
}
}
const ksuApi=(typeof ksu!=='undefined'&&ksu.exec)?ksu:(window.parent&&window.parent.ksu)?window.parent.ksu:null;
if(!ksuApi||typeof ksuApi.exec!=='function')throw new Error('KSU API unavailable');
return new Promise((res,rej)=>{
const cb=`cb_${Date.now()}_${Math.random()*10000|0}`;
window[cb]=(code,stdout,stderr)=>{
delete window[cb];
code===0?res((stdout||'').replace(/\r/g,'')):rej(new Error(stderr||stdout||'Failed'));
};
ksuApi.exec(cmd,'{}',cb);
});
}

async function propExists(prop){
try{
const result=await sh(`getprop ${prop} 2>/dev/null`);
return result && result.trim() !== '';
}catch{
return false;
}
}

async function execute(){
const selected=props.filter(p=>document.getElementById(p.id).checked);
const selectedDelete=deleteProps.filter(p=>document.getElementById(p.id).checked);
const selectedDuck=duckProps.filter(p=>document.getElementById(p.id).checked);
if(selected.length===0&&selectedDelete.length===0&&selectedDuck.length===0){
log('No items selected','err');
return;
}
setStatus('Applying...',true);
logEl.innerHTML='';

for(const p of selected){
log(p.label,'cmd');
try{
await sh(p.cmd);
log('OK','ok');
}catch(e){
log('Failed','err');
}
}

for(const p of selectedDelete){
const exists=await propExists(p.prop);
if(!exists){
log(`Skip ${p.label} (N/A)`,'info');
continue;
}
log(`Delete ${p.label}`,'cmd');
try{
await sh(`resetprop --delete ${p.prop}`);
log('Deleted','ok');
}catch(e){
log('Failed','err');
}
}

for(const p of selectedDuck){
const exists=await propExists(p.prop);
if(!exists){
log(`Skip ${p.label} (N/A)`,'info');
continue;
}
log(`Delete ${p.label}`,'cmd');
try{
await sh(`resetprop --delete ${p.prop}`);
log('Deleted','ok');
}catch(e){
log('Failed','err');
}
}

setStatus('Complete',false);
}

render();

const hasKsu=(typeof ksu!=='undefined'&&ksu.exec)||(window.parent&&window.parent.ksu&&window.parent.ksu.exec)||(window.parent&&typeof window.parent.runShellFromIframe==='function');
if(!hasKsu){
log('KSU API not available','err');
setStatus('Error',false);
}
