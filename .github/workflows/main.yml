name: Build Integrity Box Module

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Zip Module
        run: |
          # 排除 git 相關文件，將其餘內容打包
          zip -r Integrity-Box.zip . -x ".git/*" ".github/*" ".gitignore" "README.md"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Integrity-Box-Module
          path: Integrity-Box.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Integrity-Box.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
